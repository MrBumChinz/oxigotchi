# Drop-in for pwnagotchi.service
# Installed to /etc/systemd/system/pwnagotchi.service.d/splash-delay.conf
#
# Ensures the oxigotchi boot splash is visible for at least 3 seconds before
# pwnagotchi starts and reinitializes the e-ink display (which clears the
# splash image via epd.Clear()).
[Unit]
After=oxagotchi-splash.service

[Service]
ExecStartPre=/bin/sleep 3
